# Build em todo push na main. Deploy no Railway só se os secrets estiverem configurados.
# Secrets: GitHub → Settings → Secrets and variables → Actions
#   RAILWAY_TOKEN        → https://railway.com/account/tokens
#   RAILWAY_SERVICE_ID   → Railway → serviço → Settings → General → Service ID
# Guia: DEPLOY-RAILWAY.md

name: Deploy Railway

on:
  push:
    branches: [main]
  workflow_dispatch:

concurrency:
  group: railway-deploy
  cancel-in-progress: false

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: "22"
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Build
        run: npm run build

  deploy:
    needs: build
    runs-on: ubuntu-latest
    if: ${{ secrets.RAILWAY_TOKEN != '' && secrets.RAILWAY_SERVICE_ID != '' }}
    steps:
      - uses: actions/checkout@v4

      - name: Install Railway CLI
        run: npm install -g @railway/cli

      - name: Deploy to Railway
        env:
          RAILWAY_TOKEN: ${{ secrets.RAILWAY_TOKEN }}
        run: railway redeploy --service "${{ secrets.RAILWAY_SERVICE_ID }}" --yes

  deploy-skipped-hint:
    needs: build
    runs-on: ubuntu-latest
    if: ${{ secrets.RAILWAY_TOKEN == '' || secrets.RAILWAY_SERVICE_ID == '' }}
    steps:
      - name: Secrets ausentes (deploy não rodou)
        run: |
          echo "::warning::Configure RAILWAY_TOKEN e RAILWAY_SERVICE_ID em GitHub → Settings → Secrets → Actions"
          echo "Leia DEPLOY-RAILWAY.md — ou faça redeploy manual no painel Railway (Deployments → Deploy latest commit)."
